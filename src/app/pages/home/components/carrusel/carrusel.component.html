<div id="carruselDestacados" class="carousel slide" data-bs-ride="carousel" data-bs-interval="5000">
  <!-- Indicadores -->
  <div class="carousel-indicators">
    <button
      *ngFor="let pelicula of peliculas; let i = index"
      type="button"
      data-bs-target="#carruselDestacados"
      [attr.data-bs-slide-to]="i"
      [class.active]="i === 0"
      [attr.aria-current]="i === 0 ? 'true' : null"
      [attr.aria-label]="'Slide ' + (i + 1)"
    ></button>
  </div>

  <!-- Slides -->
  <div class="carousel-inner">
    <div
      class="carousel-item"
      [class.active]="i === 0"
      *ngFor="let pelicula of peliculas; let i = index"
      [style.background-image]="'url(' + obtenerFondo(pelicula) + ')'"
    >
      <div class="carousel-overlay d-flex align-items-end">
        <div class="container">
          <div class="carousel-content text-white pb-5">
            <h1 class="display-4 fw-bold">{{ pelicula.title }}</h1>
            <p class="lead mb-3">{{ resumenCorto(pelicula.overview) }}</p>
            <div class="d-flex align-items-center gap-3 mb-3">
              <span class="badge bg-warning text-dark fs-6">
                ⭐ {{ pelicula.vote_average }} / 10
              </span>
              <span class="text-light-emphasis">{{ pelicula.vote_count }} votos</span>
            </div>
            <div class="d-flex gap-2">
              <a
                [routerLink]="['/detalle', pelicula.id]"
                class="btn btn-outline-light btn-lg"
              >
                Ver detalle
              </a>
              <button (click)="toggleLista(pelicula)" class="btn btn-lg"
                [ngClass]="{'btn-warning': !(estaEnLista(pelicula) | async),'btn-en-lista': (estaEnLista(pelicula) | async)}">
                {{ (estaEnLista(pelicula) | async) ? 'En Mi Lista' : 'Agregar a Mi Lista' }}
              </button>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Controles -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carruselDestacados" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Anterior</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carruselDestacados" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Siguiente</span>
  </button>
</div>

<h2>Tendencias de hoy</h2>
<div style="display: flex; overflow-x: auto; gap: 10px;">
  <div *ngFor="let movie of trending">
    <a [routerLink]="['/detalle', movie.id]">
      <img [src]="getPosterUrl(movie.poster_path)" [alt]="movie.title" width="120">
      <p>{{ movie.title }}</p>
    </a>
  </div>
</div>

<h2>Categorias</h2>
<button (click)="selectGenre(null)">Todas</button>
<button *ngFor="let genre of genres" (click)="selectGenre(genre.id)">
  {{ genre.name }}
</button>

<p *ngIf="loading">Cargando peliculas...</p>
<p *ngIf="errorMessage">{{ errorMessage }}</p>

<h2>Peliculas</h2>
<div *ngIf="!loading && !errorMessage" style="display: flex; flex-wrap: wrap; gap: 10px;">
  <div *ngFor="let movie of movies">
    <a [routerLink]="['/detalle', movie.id]">
      <img [src]="getPosterUrl(movie.poster_path)" [alt]="movie.title" width="140">
      <h3>{{ movie.title }}</h3>
      <p>Puntaje: {{ movie.vote_average }}</p>
    </a>
  </div>
</div>

<div *ngIf="!loading && !errorMessage">
  <button (click)="previousPage()" [disabled]="currentPage === 1">Anterior</button>
  <span> Pagina {{ currentPage }} de {{ totalPages }} </span>
  <button (click)="nextPage()" [disabled]="currentPage === totalPages">Siguiente</button>
</div>
